    role_description: |-
      
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-4"
      llm_type: gpt-4
      temperature: 0
      max_tokens: 256
  -
    agent_type: llm_eval_multi
    name: Annotator_3
    final_prompt_to_use: |-
      Output with the following format strictly (You cannot end with a blank line, and the last line should be "Relevance: [Your answer (scores ONLY: just one number)]"):
      Explaination: [Your explaination]
      Relevance: [Your answer (scores ONLY: just one number)]
    role_description: |-
      
