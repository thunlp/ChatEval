prompts:
  prompt: &prompt |-
    You will be given one summary written for a news article.

    Your task is to rate the summary on one metric.

    Please make sure you read and understand these instructions carefully. Please keep this document open while reviewing, and refer to it as needed.


    Evaluation Criteria:

    Fluency (1-5): the quality of the summary in terms of grammar, spelling, punctuation, word choice, and sentence structure.

    - 1: The summary has many errors that make it hard to understand or sound unnatural. (Poor)
    - 2: Better than Poor but somehow worse than Fair. (Near Fair)
    - 3: The summary has some errors that affect the clarity or smoothness of the text, but the main points are still comprehensible. (Fair)
    - 4: Better than Fair but somehow worse than Good. (Near Good)
    - 5: The summary has few or no errors and is easy to read and follow. (Good)


    Example:


    Summary:

    ${generated_text}

    Additionally, There will be another few people given the same task like you, and you are required to discuss with each other, you can share the idea on how you think of the summary.

    Here is your discuss history:
    ${chat_history}

    Now, What is your opinion, ${agent_name} ?

    ${final_prompt}

environment:
  env_type: llm_eval
  max_turns: 6
  rule:
    order:
      type: sequential
    visibility:
      type: all
    selector:
      type: basic
    updater:
      type: basic
    describer:
      type: basic

agents:
  -
    agent_type: llm_eval_multi
    name: Annotator_1
    final_prompt_to_use: |-
      Output with the following format strictly:
      Explaination: [Your explaination]
      Fluency: [Your answer (scores ONLY: just one number)]
    role_description: |-

    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-4"
      llm_type: gpt-4
      temperature: 0
      max_tokens: 256
  -
    agent_type: llm_eval_multi
    name: Annotator_2
    final_prompt_to_use: |-
      Output with the following format strictly:
      Explaination: [Your explaination]
      Fluency: [Your answer (scores ONLY: just one number)]
    role_description: |-
      
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-4"
      llm_type: gpt-4
      temperature: 0
      max_tokens: 256
  -
    agent_type: llm_eval_multi
    name: Annotator_3
    final_prompt_to_use: |-
      Output with the following format strictly:
      Explaination: [Your explaination]
      Fluency: [Your answer (scores ONLY: just one number)]
    role_description: |-
      
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-4"
      llm_type: gpt-4
      temperature: 0
      max_tokens: 256
