prompts:
  prompt: &prompt |-
    You will be given one summary written for a news article.

    Your task is to rate the summary on one metric.

    Please make sure you read and understand these instructions carefully. Please keep this document open while reviewing, and refer to it as needed.

    Evaluation Criteria:

    Coherence (1-5) - the collective quality of all sentences. We align this dimension with the DUC quality question of structure and coherence whereby "the summary should be well-structured and well-organized. The summary should not just be a heap of related information, but should build from sentence to a coherent body of information about a topic."

    Evaluation Steps:

    1. Read the news article carefully and identify the main topic and key points.
    2. Read the summary and compare it to the news article. Check if the summary covers the main topic and key points of the news article, and if it presents them in a clear and logical order.
    3. Assign a score for coherence on a scale of 1 to 5, where 1 is the lowest and 5 is the highest based on the Evaluation Criteria.


    Example:


    Source Text:

    ${source_text}

    Summary:

    ${generated_text}

    Additionally, There will be another few people given the same task like you, and you are required to discuss with each other, you can share the idea on how you think of the summary.

    Here is your discuss history:
    ${chat_history}

    You should clarify your role (Critic or General Public) and take it in:
    ${role_description}

    Now, What is your opinion, ${agent_name} ?

    ${final_prompt}

environment:
  env_type: llm_eval
  max_turns: 6
  rule:
    order:
      type: sequential
    visibility:
      type: all
    selector:
      type: basic
    updater:
      type: basic
    describer:
      type: basic

agents:
  -
    agent_type: llm_eval_multi
    name: Critic
    final_prompt_to_use: |-
      Output with the following format strictly:
      Explaination: [Your explaination]
      Coherence: [Your answer (scores ONLY: just one number)]
    role_description: |-
      You are Critic, and you will check fluent writing, clear sentences, and good wording in summary writing. You are now going to cooperate with General Public to help rate the summary. Please think critically by yourself and note that it's fine to challenge other if you want to stick to your point.
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-4"
      llm_type: gpt-4
      temperature: 0
      max_tokens: 256
  -
    agent_type: llm_eval_multi
    name: General Public
    final_prompt_to_use: |-
      Output with the following format strictly:
      Explaination: [Your explaination]
      Coherence: [Your answer (scores ONLY: just one number)]
    role_description: |-
      You are General Public, and you are interested in the story and looking for updates on the investigation. You are now going to cooperate with Critic to help rate the summary. Please think critically by yourself and note that it's fine to challenge other if you want to stick to your point.
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-4"
      llm_type: gpt-4
      temperature: 0
      max_tokens: 256
  -
    agent_type: llm_eval_multi
    name: News Author
    final_prompt_to_use: |-
      Output with the following format strictly:
      Explaination: [Your explaination]
      Coherence: [Your answer (scores ONLY: just one number)]
    role_description: |-
      You are now News Author, you will check the summary for consistency with the original article.
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-4"
      llm_type: gpt-4
      temperature: 0
      max_tokens: 256
tools: ~