prompts:
  prompt: &prompt |-
    You will be given a conversation between two individuals. You will then be given one potential response for the next turn in the conversation. The response concerns an interesting fact, which will be provided as well.
    
    Your task is to rate the responses on one metric.
    
    Please make sure you read and understand these instructions carefully. Please keep this document open while reviewing, and refer to it as needed.


    Evaluation Crieteria:

    Naturalness (1-3) Is the degree to which the response sounds natural and similar to how a human would naturally express the information in a conversation.

    - A score of 1 : means that the response is totally different from that of humans (unnatural).
    - A score of 2 : means the response is similar to that of humans to a certain degree (somewhat natural).
    - A score of 3 : means the response is very similar to how a human would naturally express the information in a conversation (natural).

    Evaluation Steps:

    1. Read the conversation, the corresponding fact and the response carefully.
    2. Rate the response on a scale of 1-3 for Naturalness, according to the criteria above.
    3. Provide a brief explanation for your rating, referring to specific aspects of the response and the conversation.

    Example:


    Conversation History:

    ${source_text}

    Corresponding Fact:

    ${reference_text}

    Response:

    ${generated_text}

    Additionally, There will be another few people given the same task like you, and you are required to discuss with each other, you can share the idea on how you think of the response.

    Here is your discuss history:
    ${chat_history}

    ${role_description}

    Now, What is your opinion, ${agent_name} ?

    ${final_prompt}

environment:
  env_type: llm_eval
  max_turns: 6
  rule:
    order:
      type: sequential
    visibility:
      type: all
    selector:
      type: basic
    updater:
      type: basic
    describer:
      type: basic

agents:
  -
    agent_type: llm_eval_multi
    name: Critic
    final_prompt_to_use: |-
      Output with the following format strictly:
      Explaination: [Your explaination]
      Naturalness: [Your answer (scores ONLY)]
    role_description: |-
      You are Critic, and you will check fluent writing, clear sentences, and good wording in response. You are now going to cooperate with General Public and News Author to help rate the response. Please think critically by yourself and note that it's fine to challenge other if you want to stick to your point.
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-3.5-turbo-0301"
      llm_type: gpt-3.5-turbo-0301
      temperature: 0
      max_tokens: 256
  -
    agent_type: llm_eval_multi
    name: General Public
    final_prompt_to_use: |-
      Output with the following format strictly:
      Explaination: [Your explaination]
      Naturalness: [Your answer (scores ONLY)]
    role_description: |-
      You are General Public, and you are interested in the story and looking for updates on the investigation. You are now going to cooperate with Critic and News Author to help rate the response. Please think critically by yourself and note that it's fine to challenge other if you want to stick to your point.
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-3.5-turbo-0301"
      llm_type: gpt-3.5-turbo-0301
      temperature: 0
      max_tokens: 256
  -
    agent_type: llm_eval_multi
    name: News Author
    final_prompt_to_use: |-
      Output with the following format strictly:
      Explaination: [Your explaination]
      Naturalness: [Your answer (scores ONLY)]
    role_description: |-
      You are News Author, and you will check the response for consistency with the original article. You are now going to cooperate with Critic and General Public to help rate the summary. Please think critically by yourself and note that it's fine to challenge other if you want to stick to your point.
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-3.5-turbo-0301"
      llm_type: gpt-3.5-turbo-0301
      temperature: 0
      max_tokens: 256
tools: ~