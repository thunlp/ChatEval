prompts:
  prompt: &prompt |-
    You will be given a news article. You will then be given one summary written for this article.

    Your task is to rate the summary on one metric.

    Please make sure you read and understand these instructions carefully. Please keep this document open while reviewing, and refer to it as needed.


    Evaluation Criteria:

    Consistency (1-5) - the factual alignment between the summary and the summarized source. A factually consistent summary contains only statements that are entailed by the source document. Annotators were also asked to penalize summaries that contained hallucinated facts.

    Evaluation Steps:

    1. Read the news article carefully and identify the main facts and details it presents.
    2. Read the summary and compare it to the article. Check if the summary contains any factual errors that are not supported by the article.
    3. Assign a score for consistency based on the Evaluation Criteria.

    Example:


    Source Text:

    ${source_text}

    Summary:

    ${generated_text}

    Additionally, There will be another few people given the same task like you, and you are required to discuss with each other, you can share the idea on how you think of the summary.

    Here is your discuss history:
    ${chat_history}

    You should clarify your role (Critic, General Public or News Author) and take it in:
    ${role_description}

    Now, What is your opinion, ${agent_name} ?

    ${final_prompt}

environment:
  env_type: llm_eval
  max_turns: 6
  rule:
    order:
      type: sequential
    visibility:
      type: all
    selector:
      type: basic
    updater:
      type: basic
    describer:
      type: basic

agents:
  -
    agent_type: llm_eval_multi
    name: Critic
    final_prompt_to_use: |-
      Evaluation Form (scores ONLY):

      - Consistency:
    role_description: |-
      You are Critic, and you will check fluent writing, clear sentences, and good wording in summary writing. You are now going to cooperate with General Public and News Author to help rate the summary. Please think critically by yourself and note that it's fine to challenge other if you want to stick to your point.
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-4"
      llm_type: gpt-4
      temperature: 0
      max_tokens: 256
  -
    agent_type: llm_eval_multi
    name: General Public
    final_prompt_to_use: |-
      Evaluation Form (scores ONLY):

      - Consistency:
    role_description: |-
      You are General Public, and you are interested in the story and looking for updates on the investigation. You are now going to cooperate with Critic and News Author to help rate the summary. Please think critically by yourself and note that it's fine to challenge other if you want to stick to your point.
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-4"
      llm_type: gpt-4
      temperature: 0
      max_tokens: 256
  -
    agent_type: llm_eval_multi
    name: News Author
    final_prompt_to_use: |-
      Evaluation Form (scores ONLY):

      - Consistency:
    role_description: |-
      You are News Author, and you will check the summary for consistency with the original article. You are now going to cooperate with Critic and General Public to help rate the summary. Please think critically by yourself and note that it's fine to challenge other if you want to stick to your point.
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: *prompt
    llm:
      model: "gpt-4"
      llm_type: gpt-4
      temperature: 0
      max_tokens: 256

tools: ~